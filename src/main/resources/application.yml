# src/main/resources/application.yml

spring:
  application:
    name: gtvolcanos

  config:
    import: optional:file:.env[.properties]

  # ===== BASE DE DATOS =====
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ===== JPA / HIBERNATE =====
  jpa:
    hibernate:
      ddl-auto: validate # Flyway maneja la BD, JPA solo valida
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ===== FLYWAY =====
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ===== SEGURIDAD =====
  security:
    filter:
      order: 10

# ===== SERVIDOR =====
server:
  port: 8080
  servlet:
    context-path: /api/v1

# ===== JWT =====
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000 # 24 horas en ms
    refresh-expiration: 604800000 # 7 días en ms
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# ===== SWAGGER / OPENAPI =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ===== LOGS =====
logging:
  level:
    root: INFO
    com.trheecodes.gtvolcanos: DEBUG
    org.hibernate.SQL: DEBUG

---
# ===== PERFIL: LOCAL =====
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true

---
# ===== PERFIL: PRODUCCION =====
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
logging:
  level:
    root: WARN
    com.trheecodes.gtvolcanos: INFO
