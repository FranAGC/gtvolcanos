name: Build and Deploy — gtvolcanos

on:
  push:
    branches: [main]
  workflow_dispatch:   # Permite ejecución manual desde la pestaña Actions

jobs:
  # ============================================================
  # JOB 1: Compilar el JAR, construir la imagen y subirla a Docker Hub
  # ============================================================
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache de dependencias Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permisos al wrapper de Gradle
        run: chmod +x gradlew

      - name: Compilar JAR (sin tests)
        run: ./gradlew bootJar -x test --no-daemon

      - name: Configurar QEMU (soporte multi-arquitectura)
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gtvolcanos:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gtvolcanos:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 2: Conectarse al EC2 por SSH y desplegar el stack
  # ============================================================
  deploy:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "=== Descargando imagen actualizada ==="
            # Imagen pública — no requiere docker login para el pull
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/gtvolcanos:latest

            echo "=== Reiniciando stack ==="
            cd ~/gtvolcanos
            docker compose down
            docker compose pull
            docker compose up -d

            echo "=== Esperando que la app esté saludable ==="
            timeout 120 bash -c 'until docker inspect gtvolcanos-app --format="{{.State.Health.Status}}" | grep -q "healthy"; do sleep 5; echo "Esperando..."; done'
            echo "App saludable"

            echo "=== Estado del stack ==="
            docker compose ps

            echo "=== Limpiando imágenes antiguas ==="
            docker image prune -f

            echo "=== Deploy completado ==="